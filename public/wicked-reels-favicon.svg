<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="coinFavicon" x1="20%" y1="10%" x2="80%" y2="90%">
      <stop offset="0%" style="stop-color:#FFE066"/>
      <stop offset="100%" style="stop-color:#B8860B"/>
    </linearGradient>
    <linearGradient id="lipsFavicon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DD2255"/>
      <stop offset="100%" style="stop-color:#880033"/>
    </linearGradient>
  </defs>
  <!-- Dark bg -->
  <circle cx="16" cy="16" r="15.5" fill="#08080F"/>
  <!-- Coin edge ring -->
  <circle cx="16.5" cy="16.5" r="13" fill="#9A6B00"/>
  <!-- Coin face -->
  <circle cx="16" cy="16" r="12.5" fill="url(#coinFavicon)"/>
  <!-- Inner rim -->
  <circle cx="16" cy="16" r="11.5" fill="none" stroke="#9A6B00" stroke-width="0.8"/>
  <!-- Upper lip — simplified clean shape -->
  <g transform="translate(16,16)">
    <path d="M-7,-0.5 Q-5,-4 -3,-2.5 Q-1.5,-4 0,-3 Q1.5,-4 3,-2.5 Q5,-4 7,-0.5 Q4,1.5 0,1 Q-4,1.5 -7,-0.5 Z"
      fill="url(#lipsFavicon)"/>
    <!-- Lower lip -->
    <path d="M-6.5,0.5 Q-3.5,5 0,5.5 Q3.5,5 6.5,0.5 Q3.5,2 0,1.8 Q-3.5,2 -6.5,0.5 Z"
      fill="url(#lipsFavicon)"/>
    <!-- Highlight dot -->
    <ellipse cx="-1.5" cy="3.5" rx="2.5" ry="1" fill="#FF6699" fill-opacity="0.6"/>
    <!-- Mouth line -->
    <path d="M-7,-0.5 Q0,1 7,-0.5" fill="none" stroke="#660022" stroke-width="0.8" stroke-linecap="round"/>
  </g>
  <!-- Outer pink ring -->
  <circle cx="16" cy="16" r="15" fill="none" stroke="#FF6EB4" stroke-width="0.8" stroke-opacity="0.5"/>
</svg>
